# Simple example for using the shared workflows for plugins provided by plugin-ci-workflows.
# All inputs are documented in the workflow files themselves:
# https://github.com/grafana/plugin-ci-workflows/tree/main/.github/workflows
# Additional documentation is also available on EngHub, here:
# https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions/#customizing-the-workflows-with-inputs

name: Plugins - CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  check-lockfile-drift:
    name: Check for package-lock.json drift
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version-file: .nvmrc

      - name: Install dependencies (fails if lockfile is out of sync)
        run: npm ci

  ci:
    name: CI
    uses: grafana/plugin-ci-workflows/.github/workflows/ci.yml@ci-cd-workflows/v10.2.0
    permissions:
      contents: read
      id-token: write
    with:
      plugin-version-suffix: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || '' }}
      # Run plugin-validator in CI to catch issues before release
      run-plugin-validator: true
      plugin-validator-config-path: .plugin-validator.yaml
      # Skip the grafana-dev image in Playwright tests (image may be temporarily unavailable)
      run-playwright-with-skip-grafana-dev-image: true

      # TODO: add here any other CI custom inputs you may need. You most likely also have to add the same options to publish.yaml:
      #   https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/010-plugins-ci-github-actions/#customizing-the-workflows-with-inputs
