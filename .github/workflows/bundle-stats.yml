name: Bundle Stats

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  compare:
    permissions:
      contents: write
      pull-requests: write
      actions: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - uses: grafana/plugin-actions/bundle-size@main # zizmor: ignore[unpinned-uses] provided by grafana
        with:
          # The action defaults to node 22, but package.json engines require
          # node >=24 and .npmrc sets engine-strict=true, so npm hard-fails.
          node-version: "24"

