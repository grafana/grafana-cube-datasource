apiVersion: 1

datasources:
  - name: 'Cube'
    type: 'grafana-cube-datasource'
    access: proxy
    isDefault: true
    orgId: 1
    version: 1
    editable: true
    uid: 'grafana-cube-datasource'
    url: 'http://cube:4000'
    jsonData:
      deploymentType: 'self-hosted'
      exploreSqlDatasourceUid: 'postgres-datasource'
    secureJsonData:
      apiSecret: 'local-dev-only-not-a-real-secret'
  - name: 'PostgreSQL'
    type: 'postgres'
    access: proxy
    isDefault: false
    orgId: 1
    version: 1
    editable: true
    uid: 'postgres-datasource'
    url: 'postgres:5432'
    database: 'jaffle_shop'
    user: 'user'
    jsonData:
      sslmode: 'disable'
      postgresVersion: 1000
      timescaledb: false
      database: 'jaffle_shop'
    secureJsonData:
      password: 'password'
